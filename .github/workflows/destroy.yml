name: 🚨 DESTROY ALL INFRASTRUCTURE

on:
  workflow_dispatch:  # Allows manual trigger
    inputs:
      confirm_destroy:
        description: 'Type "DESTROY" to confirm'
        required: true
        default: ''

jobs:
  destroy:
    name: 🔥 Nuclear Cleanup
    runs-on: ubuntu-latest
    
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: 🏗️ Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ~1.0

    - name: 🔥 Terraform Destroy
      working-directory: ./terraform
      run: |
        terraform init
        terraform destroy -auto-approve

    - name: 🧹 Manual Cleanup (if Terraform fails)
      if: failure()
      run: |
        echo "🚨 Terraform destroy failed. Running manual cleanup..."
        
        # Delete EKS cluster
        aws eks delete-nodegroup \
          --cluster-name flask-devsecops-dev-eks \
          --nodegroup-name default-20260513095603050600000013 \
          --region us-east-1 || true
        
        aws eks delete-cluster \
          --name flask-devsecops-dev-eks \
          --region us-east-1 || true
        
        # Delete KMS keys
        for key in d1c0d223-5bf0-40d3-86c2-5cef556c7153 7a6c3050-d8c2-4621-b0a6-3bedee6f79a0; do
          aws kms cancel-key-deletion --key-id $key --region us-east-1 || true
          aws kms enable-key --key-id $key --region us-east-1 || true
          aws kms schedule-key-deletion --key-id $key --pending-window-in-days 7 --region us-east-1 || true
        done
        
        # Delete IAM resources
        aws iam detach-role-policy \
          --role-name flask-devsecops-lb-controller-role \
          --policy-arn "arn:aws:iam::219127327432:policy/flask-devsecops-lb-controller-custom-policy" || true
        
        aws iam delete-role --role-name flask-devsecops-lb-controller-role || true
        aws iam delete-policy --policy-arn "arn:aws:iam::219127327432:policy/flask-devsecops-lb-controller-custom-policy" || true
        
        # Delete S3 bucket
        aws s3 rb s3://ilya-project-tf-state --force || true
        
        echo "✅ Manual cleanup completed"
