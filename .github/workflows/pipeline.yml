name: DevSecOps Pipeline

on:
    push:
        branches: [ "main", "feature/*" ]
    pull_request:
        branches: [ "main" ]

jobs:
    # JOB 1: Static Application Security Testing (SAST)
    python-security-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
            
            - name: Install Bandit
              run: pip install bandit

            - name: Run Bandit Scan
  # We skip B104 because 0.0.0.0 is required for Docker containers to work.
  # We do NOT skip B201 (debug mode) because that should ALWAYS be blocked.
              run: bandit -r app/ -s B104

    # JOB 2: Build, Scan, and Push the Container
    build-and-push:
     needs: python-security-scan 
     runs-on: ubuntu-latest
     steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        
        - name: Build Docker image
          # Added -f docker/Dockerfile
          run: |
            docker build -f docker/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/football-app:${{ github.sha }} .

        - name: Run Trivy Security Scan
          uses: aquasecurity/trivy-action@master
          with:
            image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/football-app:${{ github.sha }}'
            format: 'table'
            exit-code: '1'
            severity: 'CRITICAL,HIGH'

        - name: Push Versioned Image
          run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/football-app:${{ github.sha }}

        - name: Push Latest Image (Main Only)
          # Only update 'latest' if we are on the main branch
          if: github.ref == 'refs/heads/main'
          run: |
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/football-app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/football-app:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/football-app:latest
