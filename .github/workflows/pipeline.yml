name: DevSecOps Pipeline

on:
  # push:
  #  branches: [ "main" ]
  workflow_dispatch: 

# REQUIRED for OIDC authentication to AWS
permissions:
  id-token: write
  contents: read

jobs:
  # JOB 1: Security Scan
  python-security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install bandit
      - run: bandit -r app/ -s B104

  # JOB 2: Build and Push Container
  build-and-push:
    needs: python-security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/football-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/football-app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/football-app:latest

  # --- TRIVY SCAN: The Security Gate ---
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/football-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # This stops the pipeline if CRITICAL bugs are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        if: success()
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/football-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/football-app:latest

          

  # JOB 3: THE ONE-CLICK DEPLOY (Using your OIDC Role)
  provision-and-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Make sure the GitHub runner has Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 2. SECURE AWS LOGIN using your existing Role
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }} # e.g., arn:aws:iam::123456789:role/github-actions-terraform-role
          aws-region: us-east-1


      # 3. Connect to Cluster
      - name: Update Kubeconfig
        run: |
          # Initialize the Core folder to download the state
          cd terraform-core
          terraform init -reconfigure -upgrade

          # Extract the true cluster name directly from the Terraform State
          CLUSTER_NAME=$(terraform output -raw cluster_name)

          # Connect to the cluster
          aws eks update-kubeconfig --name $CLUSTER_NAME --region us-east-1

      # 4. Inject API Key & Deploy App (# Create secret with all three variables from GitHub)
      - name: K8s Deploy
        run: |
          kubectl create secret generic football-app-secrets \
            --from-literal=FOOTBALL_API_KEY="${{ secrets.FOOTBALL_API_KEY }}" \
            --from-literal=FOOTBALL_API_BASE_URL="${{ secrets.FOOTBALL_API_BASE_URL }}" \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl apply -f k8s/manifests/