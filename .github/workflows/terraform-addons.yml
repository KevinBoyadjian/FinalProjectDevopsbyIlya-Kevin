name: "2. Infrastructure Add-ons"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action (plan, apply, destroy)'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read

jobs:
  addons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Add-ons Logic
        env:
          TF_VAR_alb_handshake_secret: ${{ secrets.ALB_HANDSHAKE_SECRET }}
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          cd terraform-addons
          terraform init -reconfigure -upgrade

          if [ "${{ github.event.inputs.action }}" == "plan" ]; then
            terraform plan -input=false

            elif [ "${{ github.event.inputs.action }}" == "apply" ]; then
            terraform apply -auto-approve -input=false

          elif [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            echo "Starting Janitor: Cleaning up Kubernetes resources before destroy..."
            
            # 1. Initialize Core to get cluster name
            cd ../terraform-core
            terraform init -reconfigure -input=false
            CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "")
            
            if [ -n "$CLUSTER_NAME" ]; then
              echo "Cluster found: $CLUSTER_NAME. Cleaning up Kubernetes resources..."
              
              # 2. Connect to cluster
              aws eks update-kubeconfig --name $CLUSTER_NAME --region us-east-1
              
              # 3. Delete Ingresses (triggers ALB cleanup)
              echo "Deleting Ingresses..."
              kubectl delete ingress --all -A --timeout=60s --ignore-not-found=true || true
              
              # 4. Delete LoadBalancer Services
              echo "Deleting LoadBalancer Services..."
              kubectl delete svc --all -A --field-selector=spec.type=LoadBalancer --timeout=60s --ignore-not-found=true || true
              
              # 5. Wait for AWS to clean up
              echo "Waiting 30 seconds for AWS resources to cleanup..."
              sleep 30
            else
              echo "Cluster not found in state. Skipping Kubernetes cleanup."
            fi
            
            # 6. Back to addons and destroy
            cd ../terraform-addons
            terraform init -reconfigure -input=false
            echo "Destroying Add-ons infrastructure..."
            terraform destroy -auto-approve -input=false
          fi